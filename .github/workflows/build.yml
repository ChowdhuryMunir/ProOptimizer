name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Unzip project
        run: |
          unzip AndroidPerfOptimizer.zip -d extracted/
          # Find the root of the project (where settings.gradle lives)
          PROJECT_DIR=$(find extracted -name "settings.gradle" | head -1 | xargs dirname)
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v2

      - name: Make gradlew executable
        run: chmod +x "$PROJECT_DIR/gradlew"
        
      - name: Generate gradlew if missing
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 7.0.2
          fi
          chmod +x gradlew

      - name: Build debug APK
        working-directory: ${{ env.PROJECT_DIR }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: PerfOptimizer-debug
          path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
