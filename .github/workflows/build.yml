name: Build APK

on:
  push:
      branches: [ main ]
        workflow_dispatch:

        jobs:
          build:
              runs-on: ubuntu-latest

                  steps:
                        - name: Checkout repository
                                uses: actions/checkout@v4

                                      - name: Unzip project
                                              run: |
                                                        unzip AndroidPerfOptimizer.zip -d extracted/
                                                                  PROJECT_DIR=$(find extracted -name "settings.gradle" | head -1 | xargs dirname)
                                                                            echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV

                                                                                  - name: Set up JDK 11
                                                                                          uses: actions/setup-java@v4
                                                                                                  with:
                                                                                                            java-version: '11'
                                                                                                                      distribution: 'temurin'

                                                                                                                            - name: Set up Android SDK
                                                                                                                                    uses: android-actions/setup-android@v3

                                                                                                                                          - name: Generate gradlew if missing
                                                                                                                                                  working-directory: ${{ env.PROJECT_DIR }}
                                                                                                                                                          run: |
                                                                                                                                                                    if [ ! -f "gradlew" ]; then
                                                                                                                                                                                gradle wrapper --gradle-version 7.0.2
                                                                                                                                                                                          fi
                                                                                                                                                                                                    chmod +x gradlew

                                                                                                                                                                                                          - name: Build debug APK
                                                                                                                                                                                                                  working-directory: ${{ env.PROJECT_DIR }}
                                                                                                                                                                                                                          run: ./gradlew assembleDebug --no-daemon --stacktrace

                                                                                                                                                                                                                                - name: Upload APK
                                                                                                                                                                                                                                        uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                with:
                                                                                                                                                                                                                                                          name: PerfOptimizer-debug
                                                                                                                                                                                                                                                                    path: ${{ env.PROJECT_DIR }}/app/build/outputs/apk/debug/app-debug.apk
                                                                                                                                                                                                                                                                              if-no-files-found: error